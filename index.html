<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nithik Deva — CS undergrad at NIT Warangal building agentic AI systems and the full-stack engineering underneath them. ServiceNow AI.Accelerate fellow. Based in Hyderabad."
    />
    <meta name="theme-color" content="#fcf9f8" />
    <script>
      // Resolve theme before first paint: stored choice, else OS preference.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme =
            stored ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#12100f' : '#fcf9f8');
        } catch (e) {}
      })();
    </script>
    <meta property="og:title" content="Nithik Deva — Agentic AI & Full-Stack Engineering" />
    <meta
      property="og:description"
      content="CS undergrad at NIT Warangal building agentic AI systems — ServiceNow AI.Accelerate fellow, one of 20 selected nationwide."
    />
    <title>Nithik Deva — Agentic AI & Full-Stack Engineering</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
